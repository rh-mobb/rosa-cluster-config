#################################################################
# Values for app-of-apps-application chart on the ACM hub
# acmMode: hub skips creating Application payload namespaces
# since spoke namespace management is handled by ACM
#################################################################
gitopsNamespace: application-gitops
acmMode: hub

#################################################################
# Teams to be onboarded for ACM spoke deployment
#################################################################
applications:
  - name: istio-demo
    apmnum: "istio"
    appserviceNumber: "demo"
    gitopsCreate: true
    appProject:
      adGroup: PFAUTHAD
      repos:
        - 'https://rh-mobb.github.io/validated-pattern-helm-charts'
        - 'https://github.com/rh-mobb/rosa-cluster-config.git'
        - 'https://github.com/foster-rh/bookinfo.git'
      spokeNamespaces:
        - istio-system
        - istio-demo
