#################################################################
# teamName used for argocd applicaiton names and namespace names.
#################################################################
teamName: cluster-config
#################################################################
# default Values for app-of-apps-infrastructure helm chart
#################################################################
defaults:
  # argcod application defaults
  clusterName: dev-hub-1
  finalizers: resources-finalizer.argocd.argoproj.io
  gitopsNamespace: openshift-gitops
  # Helm defaults
  helmRepoUrl: https://rh-mobb.github.io/validated-pattern-helm-charts/
  path: charts
  # Vault plugin defaults.
  plugin: true
  AWS_REGION: "ap-southeast-4"
  AVP_TYPE: "awssecretsmanager"
#################################################################
# INFRASTRUCTURE Charts to be deployed.
#################################################################
infrastructure:
  # EFS CSI Driver - Provides shared file storage
  # Update roleArn and fileSystemId after Terraform creates EFS resources
  - chart: cluster-efs
    targetRevision: 0.4.14
    namespace: openshift-cluster-csi-drivers
    values:
      roleArn: arn:aws:iam::808082629126:role/dev-hub-1-rosa-efs-csi-role-iam  # Update ACCOUNT_ID
      fileSystemId: fs-0015837396e03a7ba  # Update with actual EFS file system ID from Terraform outputs
      helper-operator:
        startingCSV: aws-efs-csi-driver-operator.v4.20.0-202511040554
  # web terminal operator
  - chart: web-terminal-operator
    targetRevision: 1.0.0
    namespace: openshift-operators
    values:
  # Compliance Operator - Provides compliance scanning and reporting
  - chart: compliance-operator
    targetRevision: 1.2.12
    namespace: openshift-compliance
    values:
      helper-operator:
        startingCSV: compliance-operator.v1.7.1

  # Overprovisioning - Optimizes cluster resource utilization and costs
  - chart: overprovisioning
    targetRevision: 0.0.9
    namespace: overprovisioning
    values:

  # Cluster Logging - Integrates with AWS CloudWatch for centralized logging
  # Update roleArn after Terraform creates CloudWatch IAM role
  - chart: cluster-logging
    targetRevision: 0.5.15
    namespace: openshift-logging
    values:
      credentials: |
        [default]
        sts_regional_endpoints = regional
        role_arn: arn:aws:iam::808082629126:role/dev-hub-1-rosa-cloudwatch-role-iam
        web_identity_token_file = /var/run/secrets/openshift/serviceaccount/token
      region: us-east-2  # Update if your cluster is in a different region
      clustername: pczarkow
      helper-operator:
        startingCSV: cluster-logging.v6.4.0

  # Optional: Advanced Cluster Management (ACM) - For multi-cluster management
  - chart: acm-operator
    targetRevision: 0.5.30
    namespace: open-cluster-management
    annotations:
      argocd.argoproj.io/compare-options: IgnoreExtraneous
    values:
      helper-operator:
        startingCSV: advanced-cluster-management.v2.16.1

  # ACM Observability - Multi-cluster metrics with Thanos + S3
  # S3 bucket and IRSA role created by terraform in acm-observability/terraform
  - chart: acm-observability
    targetRevision: 0.2.1
    namespace: open-cluster-management-observability
    values:
      objectStorage:
        s3:
          bucket: acm-observability-dev-hub-1
          endpoint: s3.ap-southeast-4.amazonaws.com
          region: ap-southeast-4
        irsaRoleArn: arn:aws:iam::808082629126:role/dev-hub-1-acm-observability-thanos
      consoleLinks:
        domain: apps.rosa.dev-hub-1.1c5d.p3.openshiftapps.com
  # Portworx Enterprise - Software-defined storage for containers
  # IAM role ARN from terraform output: portworx_role_arn
  - chart: portworx-operator
    targetRevision: 0.1.0
    namespace: portworx
    values:
      storageCluster:
        iamRoleArn: arn:aws:iam::808082629126:role/dev-hub-1-rosa-portworx

  # OpenShift Virtualization - Provides VM workload support on ROSA
  - chart: rosa-virtualization
    targetRevision: 1.0.2
    namespace: openshift-cnv
    values:
      subscription:
        startingCSV: kubevirt-hyperconverged-operator.v4.20.15

  # Migration Toolkit for Virtualization (MTV) - VM migration to OpenShift Virtualization
  - chart: mtv-operator
    targetRevision: 0.1.0
    namespace: openshift-mtv
    values: