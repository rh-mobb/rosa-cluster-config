#################################################################
# teamName used for argocd applicaiton names and namespace names.
#################################################################
teamName: cluster-config
#################################################################
# default Values for app-of-apps-infrastructure helm chart
#################################################################
defaults:
  # argcod application defaults
  clusterName: spoke-1
  finalizers: resources-finalizer.argocd.argoproj.io
  gitopsNamespace: openshift-gitops
  # Helm defaults
  helmRepoUrl: https://rh-mobb.github.io/validated-pattern-helm-charts/
  path: charts
  # Vault plugin defaults.
  plugin: true
  AWS_REGION: "ap-southeast-4"
  AVP_TYPE: "awssecretsmanager"
#################################################################
# INFRASTRUCTURE Charts to be deployed.
#################################################################
infrastructure:
  # EFS CSI Driver - Provides shared file storage
  # Update roleArn and fileSystemId after Terraform creates EFS resources
  - chart: cluster-efs
    targetRevision: 0.4.14
    namespace: openshift-cluster-csi-drivers
    values:
      roleArn: arn:aws:iam::808082629126:role/spoke-1-rosa-efs-csi-role-iam  # Update ACCOUNT_ID
      fileSystemId: fs-0015837396e03a7ba  # Update with actual EFS file system ID from Terraform outputs
      helper-operator:
        startingCSV: aws-efs-csi-driver-operator.v4.20.0-202511040554
  # web terminal operator
  - chart: web-terminal-operator
    targetRevision: 1.0.0
    namespace: openshift-operators
    values:
  # Compliance Operator - Provides compliance scanning and reporting
  - chart: compliance-operator
    targetRevision: 1.2.12
    namespace: openshift-compliance
    values:
      helper-operator:
        startingCSV: compliance-operator.v1.7.1

  # Overprovisioning - Optimizes cluster resource utilization and costs
  - chart: overprovisioning
    targetRevision: 0.0.7
    namespace: overprovisioning
    values:

  # Service Mesh 3 Operator
  - chart: servicemesh-operator-ambient
    targetRevision: 1.1.1
    namespace: openshift-operators
    values:
      subscription:
        startingCSV: servicemeshoperator3.v3.2.2
      gateway:
        enabled: true
        route:
          enabled: true
        connectivityLink:
          enabled: true
          hostname: bookinfo.spoke-apac.mobb.cloud
          tls:
            secretName: shared-app-gw-tls

  # Red Hat Connectivity Link (Kuadrant) - DNS-based traffic management
  - chart: rhcl-operator
    targetRevision: 1.0.0
    namespace: kuadrant-system
    values:
      startingCSV: rhcl-operator.v1.2.1
      kuadrant:
        enabled: true
      gatewayClass:
        enabled: false

  # External Secrets Operator - Syncs AWS Secrets Manager to K8s Secrets
  - chart: external-secrets-operator
    targetRevision: 1.1.3
    namespace: external-secrets-operator
    values:
      subscription:
        startingCSV: external-secrets-operator.v1.0.0
      serviceAccount:
        roleArn: arn:aws:iam::808082629126:role/connectivity-link-eso-dev-spoke-1
      secretStore:
        region: ap-southeast-4
        secretName: connectivity-link-route53-credentials
      target:
        namespace: istio-system
        secretName: aws-credentials

  # cert-manager Operator + Let's Encrypt ClusterIssuer - ACME DNS-01 via Route 53
  - chart: letsencrypt-clusterissuer
    targetRevision: 1.0.2
    namespace: cert-manager-operator
    values:
      name: letsencrypt-production
      subscription:
        startingCSV: cert-manager-operator.v1.18.1
      certManagerRole: arn:aws:iam::808082629126:role/dev-spoke-1-rosa-cert-manager
      acme:
        email: pfoster@redhat.com
      route53:
        hostedZoneID: Z0075233FFHL45JSZLT
        region: ap-southeast-4

  # Service Interconnect (Skupper v2) - Cross-cluster service connectivity
  - chart: service-interconnect-operator
    targetRevision: 1.0.0
    namespace: openshift-operators
    values:
      subscription:
        startingCSV: skupper-operator.v2.1.3-rh-1

  # Cluster Logging - Integrates with AWS CloudWatch for centralized logging
  # Update roleArn after Terraform creates CloudWatch IAM role
  - chart: cluster-logging
    targetRevision: 0.5.15
    namespace: openshift-logging
    values:
      credentials: |
        [default]
        sts_regional_endpoints = regional
        role_arn: arn:aws:iam::808082629126:role/spoke-1-rosa-cloudwatch-role-iam
        web_identity_token_file = /var/run/secrets/openshift/serviceaccount/token
      region: us-east-2  # Update if your cluster is in a different region
      clustername: pczarkow
      helper-operator:
        startingCSV: cluster-logging.v6.4.0

